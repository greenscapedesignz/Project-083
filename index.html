<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Project 083 — Riparian Revival: Tavarekere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Noto+Sans+Kannada:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════ */
:root{
  --navy:#1A3C5E; --teal:#2E7D6B; --amber:#C47B0A;
  --red:#B03A2E; --cream:#F7F4EF; --white:#FFFFFF;
  --ink:#1C1C1A; --mist:#EAE6DF; --smoke:#F2EFE9;
  --teal-lt:#D0EBE4; --navy-lt:#D5E3EF;
  --fw-serif:'Cormorant Garamond',Georgia,serif;
  --fw-sans:'DM Sans',system-ui,sans-serif;
  --fw-mono:'DM Mono',monospace;
  --r:10px; --trans:0.25s cubic-bezier(.4,0,.2,1);
  --sidebar:240px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fw-sans);background:var(--cream);color:var(--ink);font-size:15px;line-height:1.6;overflow-x:hidden}

/* ═══════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════ */
.sidebar{
  position:fixed;top:0;left:0;height:100vh;width:var(--sidebar);
  background:var(--navy);color:var(--white);
  display:flex;flex-direction:column;z-index:200;
  padding:0;overflow-y:auto;
  box-shadow:4px 0 24px rgba(0,0,0,0.18);
  transition:transform var(--trans);
}
.sidebar-logo{
  padding:28px 24px 20px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.logo-mark{
  display:flex;align-items:center;gap:10px;margin-bottom:4px;
}
.logo-sq{
  width:36px;height:36px;background:var(--teal);
  display:flex;align-items:center;justify-content:center;
  border-radius:4px;flex-shrink:0;
}
.logo-sq svg{width:22px;height:22px;fill:white}
.logo-text-main{font-family:var(--fw-serif);font-size:15px;font-weight:600;color:white;letter-spacing:0.02em;line-height:1.2}
.logo-text-sub{font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:0.08em;text-transform:uppercase;font-weight:400}
.sidebar-project{padding:14px 24px;border-bottom:1px solid rgba(255,255,255,0.1)}
.project-badge{
  display:inline-block;background:var(--teal);color:white;
  font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;margin-bottom:6px;
}
.project-name{font-family:var(--fw-serif);font-size:18px;font-weight:700;color:white;line-height:1.2}
.project-sub{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px}
nav{flex:1;padding:16px 0}
.nav-section-label{
  font-size:9px;letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(255,255,255,0.35);font-weight:500;
  padding:12px 24px 4px;
}
nav a{
  display:flex;align-items:center;gap:10px;
  padding:9px 24px;color:rgba(255,255,255,0.7);
  text-decoration:none;font-size:13px;font-weight:400;
  border-left:3px solid transparent;
  transition:all var(--trans);
}
nav a:hover,nav a.active{
  color:white;background:rgba(255,255,255,0.07);
  border-left-color:var(--teal);
}
nav a .nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sidebar-footer{
  padding:16px 24px;border-top:1px solid rgba(255,255,255,0.1);
  font-size:10px;color:rgba(255,255,255,0.35);line-height:1.6;
}

/* ═══════════════════════════════════════════════
   HAMBURGER
═══════════════════════════════════════════════ */
.hamburger{
  display:none;position:fixed;top:12px;left:12px;z-index:300;
  background:var(--navy);border:none;width:44px;height:44px;
  border-radius:8px;cursor:pointer;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;
  box-shadow:0 2px 12px rgba(0,0,0,0.2);
}
.hamburger span{width:20px;height:2px;background:white;border-radius:2px;transition:all var(--trans)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150}

/* ═══════════════════════════════════════════════
   MAIN
═══════════════════════════════════════════════ */
.main{margin-left:var(--sidebar);min-height:100vh}
section{padding:64px 48px;scroll-margin-top:0}
section:nth-child(even){background:var(--smoke)}

/* ═══════════════════════════════════════════════
   TYPOGRAPHY
═══════════════════════════════════════════════ */
.sec-eyebrow{
  font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--teal);font-weight:600;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.sec-eyebrow::after{content:'';flex:1;height:1px;background:var(--teal);opacity:0.25;max-width:80px}
h1.hero-title{
  font-family:var(--fw-serif);font-size:clamp(36px,4vw,56px);
  font-weight:700;line-height:1.1;color:white;margin-bottom:16px;
}
h2.sec-title{
  font-family:var(--fw-serif);font-size:clamp(26px,3vw,36px);
  font-weight:700;color:var(--navy);line-height:1.2;margin-bottom:8px;
}
h3.card-title{
  font-family:var(--fw-serif);font-size:20px;font-weight:600;
  color:var(--navy);margin-bottom:6px;
}
p.sec-lead{font-size:16px;color:#555;line-height:1.7;max-width:680px;margin-bottom:24px}

/* ═══════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════ */
#hero{
  background:var(--navy);padding:0;position:relative;overflow:hidden;
}
.hero-inner{
  padding:72px 48px 56px;position:relative;z-index:1;
}
.hero-bg-circle{
  position:absolute;border-radius:50%;background:rgba(46,125,107,0.12);
}
.hero-bg-circle:nth-child(1){width:500px;height:500px;top:-150px;right:-120px}
.hero-bg-circle:nth-child(2){width:300px;height:300px;bottom:-80px;left:80px}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  padding:6px 14px;border-radius:20px;margin-bottom:24px;
}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}
.hero-badge span{font-size:11px;color:rgba(255,255,255,0.7);letter-spacing:0.05em}
.hero-subtitle{font-size:16px;color:rgba(255,255,255,0.65);margin-bottom:36px;max-width:600px;line-height:1.6}
.hero-stats{display:flex;flex-wrap:wrap;gap:0;border:1px solid rgba(255,255,255,0.12);border-radius:var(--r);overflow:hidden;max-width:680px}
.stat-cell{
  flex:1;min-width:120px;padding:18px 20px;
  border-right:1px solid rgba(255,255,255,0.12);
}
.stat-cell:last-child{border-right:none}
.stat-val{font-family:var(--fw-serif);font-size:26px;font-weight:700;color:white;display:block}
.stat-lbl{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;display:block}
.hero-images{
  display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:0;
}
.img-placeholder{
  height:180px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  font-size:12px;font-weight:500;
}
.ip-before{background:rgba(176,58,46,0.15);border:1px solid rgba(176,58,46,0.2);color:rgba(255,255,255,0.6)}
.ip-after{background:rgba(46,125,107,0.15);border:1px solid rgba(46,125,107,0.2);color:rgba(255,255,255,0.6)}
.ip-icon{font-size:32px}

/* ═══════════════════════════════════════════════
   PROBLEM SECTION
═══════════════════════════════════════════════ */
.problem-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:24px}
.prob-card{
  background:white;border-radius:var(--r);padding:24px;
  border-top:4px solid var(--red);
  box-shadow:0 2px 16px rgba(0,0,0,0.06);
  transition:transform var(--trans),box-shadow var(--trans);
}
.prob-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.1)}
.prob-icon{font-size:32px;margin-bottom:12px;display:block}
.prob-title{font-family:var(--fw-serif);font-size:18px;font-weight:600;color:var(--red);margin-bottom:8px}
.prob-text{font-size:13px;color:#555;line-height:1.6}

/* ═══════════════════════════════════════════════
   VISION
═══════════════════════════════════════════════ */
.vision-box{
  background:var(--navy);color:white;border-radius:var(--r);
  padding:40px;margin-top:24px;position:relative;overflow:hidden;
}
.vision-box::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:240px;height:240px;border-radius:50%;
  background:rgba(46,125,107,0.15);
}
.vision-text{
  font-family:var(--fw-serif);font-size:clamp(18px,2.5vw,24px);
  color:white;line-height:1.6;position:relative;z-index:1;
  max-width:800px;
}
.vision-text em{color:#7FC4B0;font-style:normal}

/* ═══════════════════════════════════════════════
   TIER FLOW
═══════════════════════════════════════════════ */
.tier-tabs{display:flex;gap:4px;margin-bottom:24px;flex-wrap:wrap}
.tier-tab{
  padding:8px 20px;border-radius:20px;border:1px solid var(--mist);
  background:white;cursor:pointer;font-size:12px;font-weight:600;
  letter-spacing:0.04em;text-transform:uppercase;
  transition:all var(--trans);color:#666;
}
.tier-tab.active,.tier-tab:hover{background:var(--navy);color:white;border-color:var(--navy)}
.tier-tab[data-tier="2"].active,.tier-tab[data-tier="2"]:hover{background:var(--teal);border-color:var(--teal)}
.tier-tab[data-tier="3"].active,.tier-tab[data-tier="3"]:hover{background:#5D4037;border-color:#5D4037}

.tier-panel{display:none}
.tier-panel.active{display:block}

.stage-list{display:flex;flex-direction:column;gap:0}
.stage-item{
  display:grid;grid-template-columns:60px 1fr;
  gap:0;position:relative;
}
.stage-item:not(:last-child) .stage-line{
  position:absolute;left:29px;top:52px;bottom:0;
  width:2px;background:var(--mist);z-index:0;
}
.stage-num-col{padding:20px 0;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1}
.stage-num{
  width:40px;height:40px;border-radius:50%;
  background:var(--navy);color:white;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fw-mono);font-size:13px;font-weight:500;
  flex-shrink:0;box-shadow:0 0 0 4px var(--cream);
}
.stage-t2 .stage-num{background:var(--teal)}
.stage-t3 .stage-num{background:#5D4037}
.stage-track-a .stage-num{background:#1565C0}
.stage-track-b .stage-num{background:#2E7D32}
.stage-track-c .stage-num{background:#6A1B9A}

.stage-body{
  padding:16px 0 16px 20px;
  border-left:none;
}
.stage-header{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.stage-title{font-family:var(--fw-serif);font-size:20px;font-weight:600;color:var(--navy)}
.stage-subtitle{font-size:12px;color:#888;font-weight:400;margin-top:2px}
.stage-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.stage-tag{
  font-size:10px;padding:2px 9px;border-radius:20px;
  font-weight:600;letter-spacing:0.03em;
}
.tag-prof{background:var(--navy-lt);color:var(--navy)}
.tag-output{background:var(--teal-lt);color:var(--teal)}
.tag-proto{background:#FFF8E1;color:#B07A00;border:1px solid #F9E6A0}
.stage-desc{font-size:13px;color:#444;line-height:1.65;margin-bottom:10px}
.stage-outputs{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.output-pill{
  font-size:10px;background:var(--teal-lt);color:var(--teal);
  padding:3px 10px;border-radius:20px;font-weight:500;
}
.stage-card{
  background:white;border-radius:var(--r);padding:18px;
  border-left:3px solid var(--navy);
  box-shadow:0 1px 8px rgba(0,0,0,0.05);
  margin-bottom:4px;
}
.stage-t2 .stage-card{border-left-color:var(--teal)}
.stage-t3 .stage-card{border-left-color:#5D4037}

/* Prototype highlight */
.proto-highlight{
  background:linear-gradient(135deg,#E8F5F1 0%,#D0EBE4 100%);
  border:2px solid var(--teal);border-radius:var(--r);
  padding:24px;margin:12px 0;
}
.proto-label{
  font-size:9px;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--teal);font-weight:700;margin-bottom:6px;
}
.proto-title{font-family:var(--fw-serif);font-size:20px;color:var(--navy);font-weight:600;margin-bottom:8px}
.proto-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:14px}
.proto-cell{background:white;border-radius:8px;padding:12px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.proto-cell-val{font-family:var(--fw-serif);font-size:20px;font-weight:700;color:var(--teal)}
.proto-cell-lbl{font-size:10px;color:#666;margin-top:2px}

/* Tier 2 streams */
.stream-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:16px 0}
.stream-card{
  background:white;border-radius:var(--r);padding:18px;
  border-top:3px solid var(--navy);
  box-shadow:0 1px 8px rgba(0,0,0,0.06);
  transition:transform var(--trans);
}
.stream-card:hover{transform:translateY(-2px)}
.stream-card:nth-child(2){border-top-color:var(--teal)}
.stream-card:nth-child(3){border-top-color:var(--amber)}
.stream-card:nth-child(4){border-top-color:var(--red)}
.stream-card:nth-child(5){border-top-color:#7B1FA2}
.stream-num{font-family:var(--fw-mono);font-size:28px;font-weight:500;color:var(--mist);margin-bottom:6px}
.stream-title{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:4px}
.stream-desc{font-size:11px;color:#666;line-height:1.5}

/* ═══════════════════════════════════════════════
   DPR ACCORDIONS
═══════════════════════════════════════════════ */
.accordion-wrap{margin-top:24px}
.acc-item{margin-bottom:6px;border-radius:var(--r);overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.acc-btn{
  width:100%;display:flex;align-items:center;gap:16px;
  padding:16px 20px;background:white;border:none;
  cursor:pointer;text-align:left;transition:background var(--trans);
}
.acc-btn:hover{background:#FAFAF7}
.acc-btn.open{background:var(--navy)}
.acc-code{
  font-family:var(--fw-mono);font-size:11px;font-weight:500;
  background:var(--navy-lt);color:var(--navy);
  padding:3px 8px;border-radius:4px;flex-shrink:0;
  transition:all var(--trans);
}
.acc-btn.open .acc-code{background:rgba(255,255,255,0.15);color:white}
.acc-title{font-family:var(--fw-serif);font-size:17px;font-weight:600;color:var(--navy);flex:1;transition:color var(--trans)}
.acc-btn.open .acc-title{color:white}
.acc-icon{font-size:20px;flex-shrink:0;margin-left:auto;transition:transform var(--trans)}
.acc-btn.open .acc-icon{transform:rotate(90deg)}
.acc-panel{display:none;background:white;padding:0 20px;border-top:1px solid var(--mist)}
.acc-panel.open{display:block;padding:20px}
.acc-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.acc-col-label{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--teal);font-weight:700;margin-bottom:8px}
.acc-bullets{list-style:none;display:flex;flex-direction:column;gap:5px}
.acc-bullets li{font-size:12px;color:#444;padding-left:14px;position:relative;line-height:1.5}
.acc-bullets li::before{content:'→';position:absolute;left:0;color:var(--teal);font-size:10px;top:1px}
.acc-budget{
  display:inline-block;background:var(--teal-lt);color:var(--teal);
  font-family:var(--fw-mono);font-size:12px;font-weight:500;
  padding:4px 12px;border-radius:20px;margin-top:10px;
}

/* ═══════════════════════════════════════════════
   COST DASHBOARD
═══════════════════════════════════════════════ */
.cost-controls{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.cost-select{
  padding:10px 16px;border:1px solid var(--mist);border-radius:8px;
  font-family:var(--fw-sans);font-size:14px;background:white;
  color:var(--navy);cursor:pointer;font-weight:500;
}
.cost-total-badge{
  font-family:var(--fw-serif);font-size:24px;font-weight:700;
  color:var(--teal);background:var(--teal-lt);
  padding:6px 18px;border-radius:20px;
}
.cost-table{width:100%;border-collapse:collapse;background:white;border-radius:var(--r);overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.06)}
.cost-table thead th{
  background:var(--navy);color:white;
  padding:12px 16px;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;
  font-weight:600;text-align:left;
}
.cost-table tbody tr{border-bottom:1px solid var(--mist);transition:background var(--trans)}
.cost-table tbody tr:hover{background:var(--smoke)}
.cost-table tbody tr:last-child{border-bottom:none;font-weight:600;background:var(--navy-lt)}
.cost-table td{padding:11px 16px;font-size:13px;color:var(--ink)}
.cost-table td:last-child{font-family:var(--fw-mono);font-size:12px;color:var(--teal);text-align:right}
.cost-note{font-size:11px;color:#888;margin-top:12px;font-style:italic}
.scenario-pills{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.sc-pill{
  padding:6px 16px;border-radius:20px;border:1px solid var(--mist);
  background:white;cursor:pointer;font-size:12px;font-weight:500;
  transition:all var(--trans);color:#666;
}
.sc-pill.active{background:var(--navy);color:white;border-color:var(--navy)}

/* ═══════════════════════════════════════════════
   FUNDING
═══════════════════════════════════════════════ */
.funding-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:24px}
.fund-card{background:white;border-radius:var(--r);padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.fund-card.urgent{border:2px solid var(--amber);background:linear-gradient(135deg,#FFFBF0,white)}
.fund-icon{font-size:28px;margin-bottom:10px}
.fund-title{font-family:var(--fw-serif);font-size:17px;font-weight:600;color:var(--navy);margin-bottom:4px}
.fund-amount{font-family:var(--fw-mono);font-size:20px;font-weight:500;color:var(--teal);margin-bottom:8px}
.fund-desc{font-size:12px;color:#555;line-height:1.6}
.deadline-pill{
  display:inline-block;background:var(--red);color:white;
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;
  margin-top:10px;letter-spacing:0.05em;
}

/* ═══════════════════════════════════════════════
   QUESTIONNAIRE
═══════════════════════════════════════════════ */
.q-section{margin-bottom:28px}
.q-sec-title{
  font-family:var(--fw-serif);font-size:18px;font-weight:600;
  color:var(--navy);margin-bottom:14px;padding-bottom:8px;
  border-bottom:2px solid var(--teal-lt);
}
.q-item{background:white;border-radius:8px;padding:16px 18px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,0.05)}
.q-num{font-family:var(--fw-mono);font-size:10px;color:var(--teal);font-weight:500;margin-bottom:4px}
.q-text{font-size:14px;color:var(--ink);font-weight:500;margin-bottom:8px;line-height:1.5}
.q-type{font-size:10px;color:#888;font-style:italic}
.q-options{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.q-opt{font-size:11px;background:var(--smoke);color:#555;padding:3px 10px;border-radius:4px;border:1px solid var(--mist)}
.gform-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--teal);color:white;text-decoration:none;
  padding:14px 28px;border-radius:8px;font-size:14px;font-weight:600;
  margin-top:24px;transition:all var(--trans);
  box-shadow:0 4px 16px rgba(46,125,107,0.3);
}
.gform-btn:hover{background:var(--navy);transform:translateY(-2px)}

/* ═══════════════════════════════════════════════
   MAP PLACEHOLDER
═══════════════════════════════════════════════ */
.map-placeholder{

<!-- ─── QUESTIONNAIRE ─────────────────────────────────── -->
<section id="questionnaire">
  <div class="sec-eyebrow">Community Voice <span class="kn" style="display:inline;font-size:0.8em">/ ಸಮುದಾಯದ ಧ್ವನಿ</span></div>
  <h2 class="sec-title">Neighbourhood Survey<span class="kn">ನೆರೆಹೊರೆ ಸಮೀಕ್ಷೆ</span></h2>
  <p class="sec-lead">Door-to-door survey questionnaire for all residents, business owners, and institutions within the watershed boundary.<span class="kn">ಜಲಾನಯನ ಗಡಿಯೊಳಗಿನ ಎಲ್ಲಾ ನಿವಾಸಿಗಳು, ವ್ಯಾಪಾರಿಗಳು ಮತ್ತು ಸಂಸ್ಥೆಗಳಿಗೆ ಮನೆ-ಮನೆ ಸಮೀಕ್ಷೆ.</span> Every response strengthens the evidence base for the DPR.</p>

  <a href="https://forms.google.com/REPLACE_WITH_YOUR_FORM_ID" target="_blank" class="gform-btn" style="margin-bottom:32px">
    📋 Open Digital Survey Form (Google Form)
  </a>

  <div class="divider"></div>

  <p style="font-size:13px;color:#888;margin:16px 0 24px;font-style:italic">Sample questionnaire structure shown below — as it would be administered door-to-door. All responses are anonymous.</p>

  <!-- Section 1 -->
  <div class="q-section">
    <div class="q-sec-title">Section 1 — Respondent Profile<span class="kn">ವಿಭಾಗ ೧ — ಪ್ರತಿಕ್ರಿಯಾದಾರರ ಪರಿಚಯ</span></div>
    <div class="q-item"><div class="q-num">Q 1.1</div><div class="q-text">What type of resident or occupant are you?<span class="kn">ನೀವು ಯಾವ ರೀತಿಯ ನಿವಾಸಿ ಅಥವಾ ಉದ್ಯೋಗಿ?</span></div><div class="q-options"><span class="q-opt">Owner-occupant</span><span class="q-opt">Tenant (apartment)</span><span class="q-opt">PG resident</span><span class="q-opt">Shop/business owner</span><span class="q-opt">Institution/school</span><span class="q-opt">Other</span></div></div>
    <div class="q-item"><div class="q-num">Q 1.2</div><div class="q-text">How long have you lived or worked in this area?<span class="kn">ನೀವು ಈ ಪ್ರದೇಶದಲ್ಲಿ ಎಷ್ಟು ಸಮಯದಿಂದ ವಾಸಿಸುತ್ತಿದ್ದೀರಿ ಅಥವಾ ಕೆಲಸ ಮಾಡುತ್ತಿದ್ದೀರಿ?</span></div><div class="q-options"><span class="q-opt">&lt;1 year</span><span class="q-opt">1–5 years</span><span class="q-opt">5–15 years</span><span class="q-opt">&gt;15 years</span></div></div>
    <div class="q-item"><div class="q-num">Q 1.3</div><div class="q-text">Which street or locality are you closest to?<span class="kn">ನೀವು ಯಾವ ರಸ್ತೆ ಅಥವಾ ಪ್ರದೇಶಕ್ಕೆ ಹತ್ತಿರವಿದ್ದೀರಿ?</span></div><div class="q-type">Open text — helps with spatial mapping</div></div>
  </div>

  <!-- Section 2 -->
  <div class="q-section">
    <div class="q-sec-title">Section 2 — Flooding and Drainage<span class="kn">ವಿಭಾಗ ೨ — ಪ್ರವಾಹ ಮತ್ತು ಒಳಚರಂಡಿ</span></div>
    <div class="q-item"><div class="q-num">Q 2.1</div><div class="q-text">How many times did your street, home, or business flood during the 2024 monsoon?<span class="kn">೨೦೨೪ ರ ಮಳೆಗಾಲದಲ್ಲಿ ನಿಮ್ಮ ರಸ್ತೆ, ಮನೆ ಅಥವಾ ವ್ಯವಹಾರ ಎಷ್ಟು ಬಾರಿ ಪ್ರವಾಹದಿಂದ ಮುಳುಗಿತು?</span></div><div class="q-options"><span class="q-opt">Never</span><span class="q-opt">1–2 times</span><span class="q-opt">3–5 times</span><span class="q-opt">&gt;5 times</span><span class="q-opt">Continuously</span></div></div>
    <div class="q-item"><div class="q-num">Q 2.2</div><div class="q-text">What is the maximum water depth you have observed on your street during flooding?<span class="kn">ಪ್ರವಾಹದ ಸಮಯದಲ್ಲಿ ನಿಮ್ಮ ರಸ್ತೆಯಲ್ಲಿ ನೀವು ಗಮನಿಸಿದ ಗರಿಷ್ಠ ನೀರಿನ ಆಳ ಎಷ್ಟು?</span></div><div class="q-options"><span class="q-opt">Ankle deep</span><span class="q-opt">Knee deep</span><span class="q-opt">Waist deep</span><span class="q-opt">Above waist</span></div></div>
    <div class="q-item"><div class="q-num">Q 2.3</div><div class="q-text">Do you know where your stormwater drains currently discharge to?<span class="kn">ನಿಮ್ಮ ಚರಂಡಿ ಎಲ್ಲಿ ಹೋಗುತ್ತದೆ ಎಂದು ನಿಮಗೆ ತಿಳಿದಿದೆಯೇ?</span></div><div class="q-options"><span class="q-opt">Yes, the rajakaluve</span><span class="q-opt">Yes, the street</span><span class="q-opt">Yes, directly into the lake</span><span class="q-opt">No, I don't know</span></div></div>
    <div class="q-item"><div class="q-num">Q 2.4</div><div class="q-text">Has your groundwater level (borewell or open well) changed over the past 5 years?<span class="kn">ಕಳೆದ ೫ ವರ್ಷಗಳಲ್ಲಿ ನಿಮ್ಮ ಅಂತರ್ಜಲ ಮಟ್ಟ ಬದಲಾಗಿದೆಯೇ?</span></div><div class="q-options"><span class="q-opt">Fallen significantly</span><span class="q-opt">Fallen slightly</span><span class="q-opt">No change</span><span class="q-opt">Risen</span><span class="q-opt">No borewell/well</span></div></div>
  </div>

  <!-- Section 3 -->
  <div class="q-section">
    <div class="q-sec-title">Section 3 — Vehicles and Public Space<span class="kn">ವಿಭಾಗ ೩ — ವಾಹನಗಳು ಮತ್ತು ಸಾರ್ವಜನಿಕ ಜಾಗ</span></div>
    <div class="q-item"><div class="q-num">Q 3.1</div><div class="q-text">How many abandoned or derelict vehicles can you count within 100 m of your home or business?<span class="kn">ನಿಮ್ಮ ಮನೆ ಅಥವಾ ವ್ಯವಹಾರದ ೧೦೦ ಮೀ ಒಳಗೆ ಎಷ್ಟು ಪಾಳು ವಾಹನಗಳಿವೆ?</span></div><div class="q-options"><span class="q-opt">None</span><span class="q-opt">1–3</span><span class="q-opt">4–10</span><span class="q-opt">&gt;10</span></div></div>
    <div class="q-item"><div class="q-num">Q 3.2</div><div class="q-text">Do derelict or parked vehicles block your footpath on a regular basis?<span class="kn">ಪಾಳು ಅಥವಾ ನಿಲ್ಲಿಸಿದ ವಾಹನಗಳು ನಿಯಮಿತವಾಗಿ ನಿಮ್ಮ ಕಾಲುದಾರಿಯನ್ನು ತಡೆಯುತ್ತವೆಯೇ?</span></div><div class="q-options"><span class="q-opt">Never</span><span class="q-opt">Sometimes</span><span class="q-opt">Most days</span><span class="q-opt">Every day</span></div></div>
    <div class="q-item"><div class="q-num">Q 3.3</div><div class="q-text">Do you feel safe walking to the park edge or Tavarekere lake at any time of day?<span class="kn">ದಿನದ ಯಾವುದೇ ಸಮಯದಲ್ಲಿ ಉದ್ಯಾನ ಅಂಚಿಗೆ ಅಥವಾ ತಾವರೆಕೆರೆ ಕೆರೆಗೆ ನಡೆದುಕೊಂಡು ಹೋಗಲು ನಿಮಗೆ ಸುರಕ್ಷಿತ ಎನಿಸುತ್ತದೆಯೇ?</span></div><div class="q-options"><span class="q-opt">Yes, always</span><span class="q-opt">Only during daytime</span><span class="q-opt">Rarely</span><span class="q-opt">Never — I avoid it</span></div></div>
  </div>

  <!-- Section 4 -->
  <div class="q-section">
    <div class="q-sec-title">Section 4 — Walking, Cycling and Mobility<span class="kn">ವಿಭಾಗ ೪ — ನಡಿಗೆ, ಸೈಕ್ಲಿಂಗ್ ಮತ್ತು ಚಲನಶೀಲತೆ</span></div>
    <div class="q-item"><div class="q-num">Q 4.1</div><div class="q-text">How do you primarily travel to the nearest bus stop or metro station (Tavarekere Metro)?<span class="kn">ನೀವು ಹತ್ತಿರದ ಬಸ್ ನಿಲ್ದಾಣ ಅಥವಾ ಮೆಟ್ರೊ ಸ್ಟೇಷನ್‌ಗೆ ಹೇಗೆ ಹೋಗುತ್ತೀರಿ?</span></div><div class="q-options"><span class="q-opt">Walk</span><span class="q-opt">Two-wheeler</span><span class="q-opt">Auto</span><span class="q-opt">Car</span><span class="q-opt">Cycle</span></div></div>
    <div class="q-item"><div class="q-num">Q 4.2</div><div class="q-text">Would you cycle to work or school if a protected cycling track existed along the park edge?<span class="kn">ಉದ್ಯಾನ ಅಂಚಿನಲ್ಲಿ ಸಂರಕ್ಷಿತ ಸೈಕ್ಲಿಂಗ್ ಟ್ರ್ಯಾಕ್ ಇದ್ದರೆ ನೀವು ಕೆಲಸ ಅಥವಾ ಶಾಲೆಗೆ ಸೈಕಲ್ ಮಾಡುತ್ತೀರಾ?</span></div><div class="q-options"><span class="q-opt">Definitely yes</span><span class="q-opt">Probably yes</span><span class="q-opt">Unlikely</span><span class="q-opt">No</span></div></div>
    <div class="q-item"><div class="q-num">Q 4.3</div><div class="q-text">What prevents you from walking more in this neighbourhood? (Select all that apply)<span class="kn">ಈ ನೆರೆಹೊರೆಯಲ್ಲಿ ಹೆಚ್ಚು ನಡೆಯದಂತೆ ಏನು ತಡೆಯುತ್ತದೆ? (ಅನ್ವಯವಾಗುವ ಎಲ್ಲವನ್ನೂ ಆರಿಸಿ)</span></div><div class="q-options"><span class="q-opt">No footpath</span><span class="q-opt">Vehicles on footpath</span><span class="q-opt">Poor lighting</span><span class="q-opt">No shade</span><span class="q-opt">Feels unsafe</span><span class="q-opt">No seating to rest</span></div><div class="q-type">Multi-select</div></div>
  </div>

  <!-- Section 5 -->
  <div class="q-section">
    <div class="q-sec-title">Section 5 — Lake, Waste and Environment<span class="kn">ವಿಭಾಗ ೫ — ಕೆರೆ, ತ್ಯಾಜ್ಯ ಮತ್ತು ಪರಿಸರ</span></div>
    <div class="q-item"><div class="q-num">Q 5.1</div><div class="q-text">How often do you or your family visit the Tavarekere lake or park edge?<span class="kn">ನೀವು ಅಥವಾ ನಿಮ್ಮ ಕುಟುಂಬ ತಾವರೆಕೆರೆ ಕೆರೆ ಅಥವಾ ಉದ್ಯಾನ ಅಂಚನ್ನು ಎಷ್ಟು ಬಾರಿ ಭೇಟಿ ನೀಡುತ್ತೀರಿ?</span></div><div class="q-options"><span class="q-opt">Daily</span><span class="q-opt">Weekly</span><span class="q-opt">Rarely</span><span class="q-opt">Never — it is inaccessible</span><span class="q-opt">Never — it is unsafe</span></div></div>
    <div class="q-item"><div class="q-num">Q 5.2</div><div class="q-text">Have you observed sewage flowing into the lake or rajakaluve near your area?<span class="kn">ನಿಮ್ಮ ಪ್ರದೇಶದ ಸಮೀಪ ಕೆರೆ ಅಥವಾ ರಾಜಕಾಲುವೆಗೆ ಒಳಚರಂಡಿ ಹರಿಯುವುದನ್ನು ನೀವು ಗಮನಿಸಿದ್ದೀರಾ?</span></div><div class="q-options"><span class="q-opt">Yes, regularly</span><span class="q-opt">Yes, occasionally</span><span class="q-opt">Not sure</span><span class="q-opt">No</span></div></div>
    <div class="q-item"><div class="q-num">Q 5.3</div><div class="q-text">Does your building have a rainwater harvesting or recharge system?<span class="kn">ನಿಮ್ಮ ಕಟ್ಟಡದಲ್ಲಿ ಮಳೆನೀರು ಕೊಯ್ಲು ಅಥವಾ ಮರುಪೂರಣ ವ್ಯವಸ್ಥೆ ಇದೆಯೇ?</span></div><div class="q-options"><span class="q-opt">Yes, functional</span><span class="q-opt">Yes, but not working</span><span class="q-opt">No</span><span class="q-opt">Don't know</span></div></div>
    <div class="q-item"><div class="q-num">Q 5.4</div><div class="q-text">Does your building segregate wet and dry waste before disposal?<span class="kn">ನಿಮ್ಮ ಕಟ್ಟಡ ತ್ಯಾಜ್ಯ ವಿಲೇವಾರಿ ಮೊದಲು ಒದ್ದೆ ಮತ್ತು ಒಣ ತ್ಯಾಜ್ಯವನ್ನು ಪ್ರತ್ಯೇಕಿಸುತ್ತದೆಯೇ?</span></div><div class="q-options"><span class="q-opt">Always</span><span class="q-opt">Sometimes</span><span class="q-opt">Never</span><span class="q-opt">BBMP does not collect separately here</span></div></div>
  </div>

  <!-- Section 6 -->
  <div class="q-section">
    <div class="q-sec-title">Section 6 — Community Priorities and Open Input<span class="kn">ವಿಭಾಗ ೬ — ಸಮುದಾಯದ ಆದ್ಯತೆಗಳು ಮತ್ತು ಮುಕ್ತ ಅಭಿಪ್ರಾಯ</span></div>
    <div class="q-item"><div class="q-num">Q 6.1</div><div class="q-text">Which three improvements would make the biggest positive difference to your daily life? Rank in order of priority.<span class="kn">ನಿಮ್ಮ ದೈನಂದಿನ ಜೀವನದಲ್ಲಿ ಯಾವ ಮೂರು ಸುಧಾರಣೆಗಳು ದೊಡ್ಡ ಬದಲಾವಣೆ ತರುತ್ತವೆ? ಆದ್ಯತೆಯ ಕ್ರಮದಲ್ಲಿ ಶ್ರೇಣೀಕರಿಸಿ.</span></div><div class="q-options"><span class="q-opt">Safe walkway</span><span class="q-opt">Cycling track</span><span class="q-opt">Less flooding</span><span class="q-opt">Cleaner lake</span><span class="q-opt">Remove derelict cars</span><span class="q-opt">Space for children</span><span class="q-opt">Seating for elderly</span><span class="q-opt">Better lighting</span><span class="q-opt">Cleaner drains</span><span class="q-opt">Trees and shade</span></div><div class="q-type">Rank top 3</div></div>
    <div class="q-item"><div class="q-num">Q 6.2</div><div class="q-text">Is there a specific location — a crossing, a drain, a stretch of road — that you consider the most dangerous or problematic in this area?<span class="kn">ಈ ಪ್ರದೇಶದಲ್ಲಿ ಅತ್ಯಂತ ಅಪಾಯಕಾರಿ ಅಥವಾ ಸಮಸ್ಯಾತ್ಮಕ ಎಂದು ನೀವು ಭಾವಿಸುವ ನಿರ್ದಿಷ್ಟ ಸ್ಥಳ ಇದೆಯೇ?</span></div><div class="q-type">Open text — precise location descriptions welcome</div></div>
    <div class="q-item"><div class="q-num">Q 6.3</div><div class="q-text">Would you participate in a community maintenance programme (e.g. Tree Warden, waste segregation champion, lake monitoring volunteer)?<span class="kn">ಸಮುದಾಯ ನಿರ್ವಹಣಾ ಕಾರ್ಯಕ್ರಮದಲ್ಲಿ ನೀವು ಭಾಗವಹಿಸುತ್ತೀರಾ?</span></div><div class="q-options"><span class="q-opt">Yes, actively</span><span class="q-opt">Yes, occasionally</span><span class="q-opt">No, but I support the project</span><span class="q-opt">No</span></div></div>

const ham=document.getElementById('hamburger'),

document.querySelectorAll('.tier-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tier-tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tier-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tier-'+btn.dataset.tier).classList.add('active');
  });
});

/* ─── ACCORDIONS ────────────────────────── */
function toggleAcc(btn){
  const panel=btn.nextElementSibling;
  const isOpen=btn.classList.contains('open');
  document.querySelectorAll('.acc-btn').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.acc-panel').forEach(p=>p.classList.remove('open'));
  if(!isOpen){btn.classList.add('open');panel.classList.add('open');}
}

/* ─── COST DASHBOARD ────────────────────── */
const scenarios=[
  {
    label:"Scenario 1 — Baseline",
    desc:"Phase 1 park-edge pilot only. Within the GBA/BBMP ₹1–5 Crore baseline envelope. Delivers walkways, cycling track, primary rajakaluve reach, fence removal, and vehicle abatement. Sufficient to demonstrate proof-of-concept and unlock further funding.",
    total:"₹2.0–2.5 Crore",
    rows:[
      ["A","Derelict Vehicle Abatement (park edge only)","Phase 1","₹20–30L"],
      ["B","Pedestrian Walkways 850 m (basic)","Phase 1","₹55–70L"],
      ["C","Rajakaluve Rejuvenation (primary 850 m reach)","Phase 1","₹40–60L"],

      ["E","Fence Removal + Native Hedgerow","Phase 1","₹25–40L"],
      ["H","Cycling Track + 2 Skating Zones","Phase 1","₹30–45L"],
      ["—","Pre-DPR Surveys (allocated to Phase 1)","Pre-Phase","₹10–20L"],
      ["—","Contingency (10%)","—","₹20–27L"],
      ["TOTAL","Phase 1 — Park Edge Pilot","Year 1","₹2.0–2.5 Cr"],
    ]
  },
  {
    label:"Scenario 2 — Optimised",
    desc:"Phase 1 + Phase 2. Full park edge including all utility upgrading, inclusive spaces, SWM infrastructure, STP commissioning, and neighbourhood drain upgrading. Optimises value within a ₹3–4 Crore combined envelope, leveraging BBMP drainage allocation alongside CSR.",
    total:"₹3.5–4.5 Crore",
    rows:[
      ["A","Derelict Vehicle Abatement (park + neighbourhood roads)","Phase 1","₹35–45L"],
      ["B","Pedestrian Walkways + Inclusive Spaces (full spec)","Phase 1","₹70L–1.0Cr"],
      ["C","Rajakaluve + Neighbourhood Drain Upgrading + Recharge","Phase 1+2","₹80L–1.0Cr"],
      ["D","Parking APP + Neighbourhood Traffic Improvement","Phase 1+2","₹25–35L"],
      ["E","Fence Removal + Biophilic Edge (full 850 m)","Phase 1","₹35–50L"],
      ["F","Inclusive Space + CPTED + Utility Corridor","Phase 1+2","₹40–55L"],
      ["H","Cycling Track + Skating Zones (full)","Phase 1","₹35–50L"],
      ["I","Solid Waste Infrastructure + STP Phase 1","Phase 2","₹30–45L"],
      ["—","Contingency (10%)","—","₹35–43L"],
      ["TOTAL","Phase 1 + 2","Years 1–2","₹3.5–4.5 Cr"],
    ]
  },
  {
    label:"Scenario 3 — Enhanced",
    desc:"Full five-year programme across all four phases. All ten components (A–J) including lake deconcretisation and bioengineering, full watershed STP, floating wetlands, policy adoption, and replication. Requires multi-year BBMP, CSR, and climate fund co-financing.",
    total:"₹5.5–7.5 Crore",
    rows:[
      ["A–H","All Phase 1 Works (Scenario 2 base)","Phase 1","₹2.0–2.5Cr"],
      ["I","Full SWM Infrastructure + STP Commissioning","Phase 2","₹35–55L"],
      ["C","Upper Sub-catchment Drain Upgrading","Phase 2+3","₹40–60L"],
      ["J","Lake Deconcretisation + Bioengineering + Wetlands","Phase 3","₹50–70L"],
      ["G","Full Watershed Atlas + Policy Instruments + BNG","Phase 3+4","₹40–60L"],
      ["—","Prototype Pilot (Stage 9) — 50 m stretch","Pre-Phase 1","₹15–25L"],
      ["—","M&E, Policy Rollout, Replication (Years 4–5)","Phase 4","₹50L–1.0Cr"],
      ["—","Contingency (10%)","—","₹55–73L"],
      ["TOTAL","Full 5-Year Programme","Years 1–5","₹5.5–7.5 Cr"],
    ]
  }
];

let currentScenario=0;
function setScenario(el,idx){
  document.querySelectorAll('.sc-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  currentScenario=idx;
  renderCost();
}
function renderCost(){
  const sc=scenarios[currentScenario];
  document.getElementById('cost-desc').textContent=sc.desc;
  document.getElementById('cost-total').textContent=sc.total;
  const tbody=document.getElementById('cost-tbody');
  tbody.innerHTML='';
  sc.rows.forEach((r,i)=>{
    const tr=document.createElement('tr');
    if(i===sc.rows.length-1) tr.style.fontWeight='600';
    tr.innerHTML=`<td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td>`;
    tbody.appendChild(tr);
  });
}
renderCost();

const navLinks=document.querySelectorAll('nav a');
window.addEventListener('scroll',()=>{
  let current='';
  sections.forEach(sec=>{
    if(window.scrollY>=sec.offsetTop-120) current=sec.id||'';
  });
  navLinks.forEach(a=>{
    a.classList.remove('active');
    if(a.getAttribute('href')==='#'+current) a.classList.add('active');
  });
},{passive:true});
</script>
